<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>CricketPro — Team Manager Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Source+Sans+3:wght@300;400;600&display=swap" rel="stylesheet"/>
<style>
  :root{ --green:#1a7a2e; --green-light:#25a83e; --green-dark:#0f4d1c; --gold:#e8b84b; --white:#fff; --cream:#faf7f0; --muted:#6b7d6e; --radius:10px; --shadow:0 4px 24px rgba(0,0,0,0.1); }
  *{ box-sizing:border-box; margin:0; padding:0; }
  body{ font-family:'Source Sans 3',sans-serif; background:var(--cream); }
  header{ background:linear-gradient(135deg,#0f4d1c,#e67e22); color:var(--white); padding:0; position:sticky; top:0; z-index:100; box-shadow:0 3px 18px rgba(0,0,0,0.25); }
  .hdr-inner{ max-width:1200px; margin:0 auto; padding:14px 28px; display:flex; align-items:center; justify-content:space-between; }
  .hdr-left{ display:flex; align-items:center; gap:12px; }
  .hdr-left h1{ font-family:'Oswald',sans-serif; font-size:1.3rem; font-weight:700; text-transform:uppercase; }
  .hdr-left p{ font-size:0.76rem; opacity:0.78; }
  .hdr-right{ display:flex; align-items:center; gap:12px; }
  .user-badge{ background:rgba(255,255,255,0.15); padding:5px 12px; border-radius:20px; font-size:0.82rem; }
  .btn-logout{ background:rgba(255,255,255,0.12); color:var(--white); border:1px solid rgba(255,255,255,0.3); padding:7px 15px; border-radius:6px; font-family:'Oswald',sans-serif; font-size:0.82rem; cursor:pointer; text-transform:uppercase; }
  .btn-logout:hover{ background:rgba(255,255,255,0.22); }
  main{ max-width:1200px; margin:0 auto; padding:28px; }
  .welcome{ background:linear-gradient(135deg,#0f4d1c,#e67e22); color:var(--white); border-radius:var(--radius); padding:28px 32px; margin-bottom:28px; display:flex; align-items:center; gap:20px; }
  .welcome-icon{ font-size:3.5rem; }
  .welcome h2{ font-family:'Oswald',sans-serif; font-size:1.7rem; text-transform:uppercase; margin-bottom:4px; }
  .welcome p{ font-size:0.9rem; opacity:0.85; }
  .grid-2{ display:grid; grid-template-columns:1fr 1fr; gap:22px; margin-bottom:22px; }
  @media(max-width:768px){ .grid-2{grid-template-columns:1fr;} }
  .card{ background:var(--white); border-radius:var(--radius); box-shadow:var(--shadow); overflow:hidden; }
  .card-hdr{ background:linear-gradient(90deg,#0f4d1c,#e67e22); color:var(--white); padding:13px 18px; font-family:'Oswald',sans-serif; font-size:0.95rem; font-weight:600; letter-spacing:0.05em; text-transform:uppercase; }
  .card-body{ padding:18px; }
  .form-group{ margin-bottom:14px; }
  .form-group label{ display:block; font-size:0.76rem; font-weight:600; color:var(--muted); text-transform:uppercase; letter-spacing:0.06em; margin-bottom:5px; }
  .form-group input,.form-group select{ width:100%; padding:9px 12px; border:1.5px solid #d4dcd5; border-radius:6px; font-size:0.92rem; background:#f8faf8; outline:none; }
  .form-group input:focus,.form-group select:focus{ border-color:var(--green-light); background:var(--white); box-shadow:0 0 0 3px rgba(37,168,62,0.12); }
  .form-row{ display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  .btn{ display:inline-flex; align-items:center; gap:6px; padding:9px 18px; border:none; border-radius:6px; font-family:'Oswald',sans-serif; font-size:0.85rem; font-weight:600; text-transform:uppercase; cursor:pointer; transition:0.2s; }
  .btn-primary{ background:linear-gradient(135deg,var(--green),var(--green-light)); color:var(--white); }
  .btn-primary:hover{ transform:translateY(-1px); box-shadow:0 4px 14px rgba(26,122,46,0.3); }
  .btn-full{ width:100%; justify-content:center; margin-top:6px; }
  .btn-danger{ background:#c0392b; color:#fff; padding:5px 11px; font-size:0.76rem; }
  table{ width:100%; border-collapse:collapse; font-size:0.86rem; }
  thead tr{ background:linear-gradient(90deg,#0f4d1c,#e67e22); color:var(--white); }
  thead th{ padding:10px 12px; text-align:left; font-family:'Oswald',sans-serif; font-weight:400; font-size:0.78rem; letter-spacing:0.07em; text-transform:uppercase; }
  tbody tr{ border-bottom:1px solid #e8ede9; } tbody tr:hover{ background:#f0f8f1; }
  tbody td{ padding:10px 12px; }
  .empty-row td{ text-align:center; padding:24px; color:var(--muted); font-style:italic; }
  .badge{ display:inline-block; padding:2px 9px; border-radius:20px; font-size:0.72rem; font-weight:600; text-transform:uppercase; }
  .b-green{background:#d4edda;color:#155724;} .b-gold{background:#fff3cd;color:#856404;} .b-blue{background:#d1ecf1;color:#0c5460;} .b-purple{background:#e2d9f3;color:#4a235a;}
  #toast-container{ position:fixed; top:18px; right:18px; z-index:9999; display:flex; flex-direction:column; gap:9px; }
  .toast{ padding:12px 18px; border-radius:8px; color:var(--white); font-size:0.88rem; font-weight:600; min-width:250px; box-shadow:0 4px 16px rgba(0,0,0,0.2); animation:slideIn 0.3s ease,fadeOut 0.4s 2.6s ease forwards; }
  .toast-success{ background:var(--green); } .toast-error{ background:#c0392b; }
  @keyframes slideIn{ from{transform:translateX(120%);opacity:0} to{transform:none;opacity:1} }
  @keyframes fadeOut{ to{opacity:0;transform:translateX(120%)} }
</style>
</head>
<body>
<div id="toast-container"></div>

<header>
  <div class="hdr-inner">
    <div class="hdr-left">
      <span style="font-size:1.8rem">🏏</span>
      <div><h1>CricketPro — Team Manager</h1><p>Manage your team's players and roster</p></div>
    </div>
    <div class="hdr-right">
      <div class="user-badge">👔 <span id="username-display">Manager</span></div>
      <button class="btn-logout" onclick="logout()">🚪 Logout</button>
    </div>
  </div>
</header>

<main>
  <div class="welcome">
    <div class="welcome-icon">👔</div>
    <div>
      <h2>Welcome, <span id="welcome-name">Manager</span>!</h2>
      <p>Manage your team roster — add, edit, and view your team's players.</p>
    </div>
  </div>

  <div class="grid-2">
    <div class="card">
      <div class="card-hdr">➕ Add Player to Your Team</div>
      <div class="card-body">
        <div class="form-group"><label>Player Name *</label><input id="p-name" placeholder="e.g. Virat Kohli"/></div>
        <div class="form-row">
          <div class="form-group"><label>Role</label>
            <select id="p-role"><option value="">-- Role --</option><option>Batsman</option><option>Bowler</option><option>All-rounder</option><option>Wicket-keeper</option></select>
          </div>
          <div class="form-group"><label>Jersey #</label><input type="number" id="p-jersey" placeholder="18"/></div>
        </div>
        <div class="form-row">
          <div class="form-group"><label>Age</label><input type="number" id="p-age" placeholder="28"/></div>
          <div class="form-group"><label>Nationality</label><input id="p-nat" placeholder="Indian"/></div>
        </div>
        <div class="form-group"><label>Team *</label><select id="p-team"><option value="">-- Select Team --</option></select></div>
        <button class="btn btn-primary btn-full" onclick="savePlayer()">💾 Add Player</button>
      </div>
    </div>

    <div class="card">
      <div class="card-hdr">📋 Your Team's Players</div>
      <div class="card-body" style="padding:0">
        <table>
          <thead><tr><th>#</th><th>Name</th><th>Role</th><th>Jersey</th><th>Age</th><th>Actions</th></tr></thead>
          <tbody id="players-tbody"></tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- Team matches -->
  <div class="card">
    <div class="card-hdr">⚔ Team Match Schedule</div>
    <div class="card-body" style="padding:0">
      <table>
        <thead><tr><th>Teams</th><th>Type</th><th>Date</th><th>Venue</th><th>Status</th></tr></thead>
        <tbody id="matches-tbody"></tbody>
      </table>
    </div>
  </div>
</main>

<script>
function toast(msg, type='success') {
  const c = document.getElementById('toast-container');
  const t = document.createElement('div');
  t.className = `toast toast-${type}`;
  t.innerHTML = (type==='success'?'✅':'❌') + ' ' + msg;
  c.appendChild(t); setTimeout(() => t.remove(), 3100);
}

async function api(url, opts={}) {
  const r = await fetch(url, { headers:{'Content-Type':'application/json'}, ...opts });
  const d = await r.json().catch(()=>({}));
  if (!r.ok) throw new Error(d.error || 'Request failed');
  return d;
}

async function checkSession() {
  try {
    const d = await api('/api/auth/me');
    document.getElementById('username-display').textContent = d.username;
    document.getElementById('welcome-name').textContent = d.username;
    if (d.role === 'ADMIN') window.location.href = '/admin.html';
    if (d.role !== 'TEAM_MANAGER' && d.role !== 'ADMIN') window.location.href = '/user-dashboard.html';
  } catch { window.location.href = '/login.html'; }
}

async function logout() {
  await fetch('/api/auth/logout',{method:'POST'}).catch(()=>{});
  window.location.href = '/login.html';
}

async function loadAll() {
  // Load teams dropdown
  try {
    const teams = await api('/api/teams');
    const sel = document.getElementById('p-team');
    sel.innerHTML = '<option value="">-- Select Team --</option>';
    teams.forEach(t => sel.appendChild(new Option(t.teamName, t.id)));
  } catch(e){}

  // Load players
  try {
    const players = await api('/api/players');
    const tb = document.getElementById('players-tbody');
    if (!players.length) { tb.innerHTML='<tr class="empty-row"><td colspan="6">No players yet.</td></tr>'; return; }
    tb.innerHTML = players.map((p,i)=>`
      <tr><td>${i+1}</td><td><strong>${p.playerName}</strong></td>
      <td><span class="badge ${{'Batsman':'b-green','Bowler':'b-blue','All-rounder':'b-gold','Wicket-keeper':'b-purple'}[p.role]||'b-gold'}">${p.role||'–'}</span></td>
      <td>${p.jerseyNumber!=null?'#'+p.jerseyNumber:'–'}</td>
      <td>${p.age||'–'}</td>
      <td><button class="btn btn-danger" onclick="delPlayer(${p.id},'${p.playerName}')">🗑</button></td></tr>`).join('');
  } catch(e){}

  // Load matches
  try {
    const matches = await api('/api/matches');
    const tb = document.getElementById('matches-tbody');
    tb.innerHTML = matches.length ? matches.map(m=>`<tr>
      <td><strong>${m.team1?.teamName||'?'}</strong> vs <strong>${m.team2?.teamName||'?'}</strong></td>
      <td>${m.matchType?`<span class="badge b-blue">${m.matchType}</span>`:'–'}</td>
      <td>${m.matchDate||'–'}</td><td>${m.venue||'–'}</td>
      <td><span class="badge ${{'Scheduled':'b-gold','Live':'b-green','Completed':'b-blue'}[m.status]||'b-gold'}">${m.status||'–'}</span></td></tr>`).join('')
      : '<tr class="empty-row"><td colspan="5">No matches.</td></tr>';
  } catch(e){}
}

async function savePlayer() {
  const tid = document.getElementById('p-team').value;
  const name = document.getElementById('p-name').value.trim();
  if (!name) { toast('Player name required','error'); return; }
  if (!tid) { toast('Select team','error'); return; }
  try {
    await api('/api/players',{method:'POST',body:JSON.stringify({
      playerName: name, role: document.getElementById('p-role').value,
      jerseyNumber: parseInt(document.getElementById('p-jersey').value)||null,
      age: parseInt(document.getElementById('p-age').value)||null,
      nationality: document.getElementById('p-nat').value.trim(),
      team: { id: parseInt(tid) }
    })});
    toast('Player added!');
    ['p-name','p-jersey','p-age','p-nat'].forEach(x=>document.getElementById(x).value='');
    document.getElementById('p-role').value='';
    loadAll();
  } catch(e){}
}

async function delPlayer(id,name) {
  if (!confirm(`Delete player "${name}"?`)) return;
  try { await api(`/api/players/${id}`,{method:'DELETE'}); toast('Deleted'); loadAll(); } catch(e){}
}

window.addEventListener('DOMContentLoaded', () => { checkSession(); loadAll(); });
</script>
</body>
</html>
